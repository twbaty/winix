# Winix cppcheck suppression list
#
# Style-only suppressions — these do not represent real defects.
# Reviewed 2026-03-08; revisit on major refactors.

# Pointer/parameter const-ness — pure style in C; no correctness impact
constVariablePointer
constParameterPointer
constParameter
constVariable
constVariableReference

# Variable declared slightly outside its tightest scope — intentional for readability
variableScope

# STL algorithm suggestions — only applies to C++ shell files; style preference
useStlAlgorithm

# Useless substr calls — existing code is intentional (clarity over micro-opt)
uselessCallsSubstr

# Branch analysis limit info messages — not warnings
normalCheckLevelMaxBranches

# knownConditionTrueFalse — false positives from limited branch analysis;
# argc-argi checks and loop-break patterns are intentional defensive guards
knownConditionTrueFalse

# internalAstError — cppcheck cannot parse C99 compound literals (Cmd[]){...}
# used in main.cpp; not a real error
internalAstError
