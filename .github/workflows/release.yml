name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Package (Windows / MinGW-w64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2 + MinGW-w64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            make

      - name: Configure (CMake)
        shell: msys2 {0}
        run: |
          cmake -G "MSYS Makefiles" \
                -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX="$(pwd)/staging" \
                .

      - name: Build
        shell: msys2 {0}
        run: cmake --build build -j$(nproc)

      - name: Run tests
        shell: pwsh
        run: |
          $env:PATH = "C:\msys64\mingw64\bin;" + $env:PATH
          python tests/run_tests.py --build-dir build

      - name: Stage install layout
        shell: msys2 {0}
        run: |
          cmake --install build --prefix "$(pwd)/staging"
          cp install.bat   staging/install.bat
          cp uninstall.bat staging/uninstall.bat

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION_NUM=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify VERSION file matches tag
        shell: bash
        run: |
          TAG_VER="${{ steps.version.outputs.VERSION_NUM }}"
          FILE_VER="$(cat VERSION | tr -d '[:space:]')"
          if [ "$TAG_VER" != "$FILE_VER" ]; then
            echo "ERROR: git tag v${TAG_VER} does not match VERSION file (${FILE_VER})"
            echo "Update the VERSION file before tagging a release."
            exit 1
          fi
          echo "Version check passed: ${FILE_VER}"

      - name: Create release zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zipName = "winix-${version}-windows-x64.zip"
          Compress-Archive -Path staging\* -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Winix ${{ steps.version.outputs.VERSION }}
          files: ${{ env.ZIP_NAME }}
          fail_on_unmatched_files: true
          generate_release_notes: false
          make_latest: true
          body: |
            ## Install

            1. Download **${{ env.ZIP_NAME }}** below
            2. Extract anywhere
            3. Right-click **install.bat** → Run as administrator
            4. Open any terminal and type `winix`

            No MinGW, CMake, or Git required — just the zip.

            ---

            See [NEXT.md](https://github.com/twbaty/winix/blob/main/NEXT.md) for full changelog.
